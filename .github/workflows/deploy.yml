name: Build and Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ 登录 Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ 构建并推送镜像（带版本号）
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-frount:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-frount:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

      # 4️⃣ 部署到服务器（核心）
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/jjtools

            echo "==== 更新 frount 镜像版本 ===="
            sed -i "s|ai-frount:.*|ai-frount:${{ github.sha }}|g" docker-compose.yml

            echo "==== 拉取新镜像 ===="
            docker compose pull frount

            echo "==== 重启 frount ===="
            docker compose up -d frount

            echo "==== 当前版本 ===="
            docker ps | grep ai-frount