# 本仓库（ai-frount）仅负责构建并推送前端静态镜像。
# 服务器侧在 ~/jjtools 使用 docker-compose.yml 引用镜像后执行 docker compose pull && docker compose up -d。
name: Build and Push Frontend Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # DOCKER_PASSWORD 须为 Docker Hub「访问令牌」(Access Token)，且权限包含 Read & Write（仅 Read 会报 401 insufficient scopes）。
      # 创建：https://hub.docker.com/settings/security → New Access Token → Read, Write（或 Read, Write, Delete）
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 可选：若同时推送到阿里云 ACR，取消注释并配置下方 secrets / vars，并在 tags 中增加第二行镜像地址。
      # - name: Login to Aliyun Container Registry
      #   if: ${{ vars.ALIYUN_REGISTRY_URL != '' }}
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ${{ vars.ALIYUN_REGISTRY_URL }}
      #     username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
      #     password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ai-frount:latest
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
